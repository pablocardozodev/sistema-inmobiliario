        <!--selector de filtros dinámico para que el usuario pueda ordenar las propiedades por distintos criterios 
        (ubicación, precio, estado)-->
        <div class="mb-3">
          <label for="filtro-orden" class="form-label">Ordenar por:</label>
          <select id="filtro-orden" class="form-select w-auto d-inline-block">
            <option value="ubicacion">Ubicación (A-Z)</option>

        <div class="form-check form-switch mb-3">

        </div>

        <section id="vista-tabla">
          <table id="lista-todas-propiedades" class="table table-striped table-hover">

              <tr>

                <th>Estado</th>

              </tr>
            </thead>
            <tbody>
              <!-- Filas dinámicas -->
            </tbody>

        <!-- Modal Crear/Editar Propiedades -->
        <div class="modal fade" id="modalCrearPropiedad" tabindex="-1" aria-labelledby="modalPropiedadLabel" aria-hidden="true">
          <div class="modal-dialog">
            <div class="modal-content">
              
              <div class="modal-header">
                <h5 class="modal-title" id="modalPropiedadLabel">Crear Propiedad</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Cerrar"></button>
              </div>
              
              <div class="modal-body">
                <form id="form-propiedad">
                  <input type="text" id="ubicacion" name="ubicacion" class="form-control mb-2" placeholder="Ubicación" required>
                  <input type="number" id="precio" name="precio" class="form-control mb-2" placeholder="Precio" required>
                  <select id="estado" required>
                        <option value="libre" selected>Libre</option>
                        <option value="ocupada">Ocupada</option>
                        <option value="reservada">Reservada</option>
                  </select>
                </form>
              </div>
              
              <div class="modal-footer">
                <button type="button" id="btn-limpiar-propiedad" class="btn btn-warning">Limpiar</button>
                <button type="button" id="btn-cancelar-propiedad" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
                <button type="submit" form="form-propiedad" class="btn btn-primary">Crear</button>
              </div>
            </div>
          </div>
        </div>

         <!-- Modal Nuevo Editar Propiedad -->
        <div class="modal fade" id="modalEditarPropiedad" tabindex="-1" aria-labelledby="modalEditarPropiedadLabel" aria-hidden="true">
          <div class="modal-dialog">
            <div class="modal-content">
              
              <div class="modal-header">
                <h5 class="modal-title" id="modalEditarClienteLabel">Editar Propiedad 2</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Cerrar"></button>
              </div>
              
              <div class="modal-body">
                <form id="form-editar-propiedad">
                  <input type="hidden" id="editar-id" name="id">
                  <input type="text" id="editar-ubicacion" name="ubicacion" class="form-control mb-2" placeholder="Nueva Ubicación" required>
                  <input type="text" id="editar-precio" name="precio" class="form-control mb-2" placeholder="Nuevo precio" required>
                  <select id="editar-estado">
                    <option value="libre">Libre</option>
                    <option value="ocupada">Ocupada</option>
                    <option value="reservada">Reservada</option>
                </select>
                </form>
              </div>
              
              <div class="modal-footer">
                <button type="button" id="btn-cancelar-edicion-propiedad" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
                <button type="submit" form="form-editar-propiedad" class="btn btn-primary">Guardar cambios</button>
