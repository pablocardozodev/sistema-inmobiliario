<!-- Modal Crear/Editar Cliente -->
<div class="modal fade" id="modalCrearCliente" tabindex="-1" aria-labelledby="modalClienteLabel" aria-hidden="true">
  <div class="modal-dialog">
    <div class="modal-content">
      
      <div class="modal-header">
        <h5 class="modal-title" id="modalClienteLabel">Crear Cliente</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Cerrar"></button>
      </div>
      
      <div class="modal-body">
        <form id="form-cliente">
          <input type="text" id="nombre" name="nombre" class="form-control mb-2" placeholder="Nombre" required>
          <input type="text" id="apellido" name="apellido" class="form-control mb-2" placeholder="Apellido" required>
          <input type="email" id="email" name="email" class="form-control mb-2" placeholder="Email" required>
          <input type="tel" id="telefono" name="telefono" class="form-control mb-2" placeholder="Teléfono">
        </form>
      </div>
      
      <div class="modal-footer">
        <button type="button" id="btn-limpiar-cliente" class="btn btn-warning">Limpiar</button>
        <button type="button" id="btn-cancelar-cliente" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
        <button type="submit" form="form-cliente" class="btn btn-primary">Crear</button>
      </div>
      
    </div>
  </div>
</div>

      <!-- Modal Nuevo Editar Cliente -->
    <div class="modal fade" id="modalEditarCliente" tabindex="-1" aria-labelledby="modalEditarClienteLabel" aria-hidden="true">
      <div class="modal-dialog">
        <div class="modal-content">
          
          <div class="modal-header">
            <h5 class="modal-title" id="modalEditarClienteLabel">Editar Cliente</h5>
            <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Cerrar"></button>
          </div>
          
          <div class="modal-body">
            <form id="form-editar-cliente">
              <input type="hidden" id="editar-id" name="id">
              <input type="text" id="editar-nombre" name="nombre" class="form-control mb-2" placeholder="Nuevo nombre" required>
              <input type="text" id="editar-apellido" name="apellido" class="form-control mb-2" placeholder="Nuevo apellido" required>
              <input type="email" id="editar-email" name="email" class="form-control mb-2" placeholder="Nuevo email" required>
              <input type="tel" id="editar-telefono" name="telefono" class="form-control mb-2" placeholder="Nuevo teléfono">
            </form>
          </div>
          
          <div class="modal-footer">
            <button type="button" id="btn-cancelar-edicion-cliente" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
            <button type="submit" form="form-editar-cliente" class="btn btn-primary">Guardar cambios</button>
          </div>
          
        </div>
      </div>
